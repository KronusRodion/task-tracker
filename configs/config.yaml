port: 8080

auth:
  access_secret: "${ACCESS_SECRET}" 
  refresh_secret: "${REFRESH_SECRET}"
  issuer: "task-tracker-prod"
  access_ttl: "15m"
  refresh_ttl: "720h"

database:
  host: "${DB_HOST}"
  port: 5432
  user: "${DB_USER}"
  password: "${DB_PASSWORD}"
  dbname: "task_tracker"
  sslmode: "require"
  timeout: "5s"
  max_open_conns: 100
  max_idle_conns: 20

cache:
  host: "${REDIS_HOST}"
  port: 6379
  password: "${REDIS_PASSWORD}"
  db: 0